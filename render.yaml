services:
  - type: web
    name: edupath
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: adk web app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "False"
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite

